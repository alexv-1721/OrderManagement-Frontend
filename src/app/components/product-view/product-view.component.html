<div class="product-view-container" *ngIf="productDetails">
  <div class="product-header">
    <button pButton icon="pi pi-arrow-left" label="Back to Products" class="p-button-text p-button-plain mb-4" routerLink="/products"></button>
  </div>
  
  <p-card class="product-view-card">
    <div class="product-view-content">
      <div class="image-section">
        <img [src]="'assets/images/' + productDetails.productImage" [alt]="productDetails.productName">
      </div>
      <div class="details-section">
        <div class="category-badge">{{productDetails.category}}</div>
        <h1>{{productDetails.productName}}</h1>
        
        <div class="rating-row mb-3">
          <i class="pi pi-star-fill text-yellow-500"></i>
          <span>{{productDetails.rating}} ({{productDetails.reviewCount}} reviews)</span>
        </div>
        
        <div class="price mb-4">${{productDetails.price}}</div>
        
        <div class="description-block">
          <h3>Description</h3>
          <p>{{productDetails.description}}</p>
        </div>
        
        <div class="action-block mt-5">
          <button pButton label="Add to Cart" icon="pi pi-shopping-cart" class="p-button-lg w-full" (click)="addToCart(productDetails.id)"></button>
        </div>
      </div>
    </div>
  </p-card>
</div>

<div class="spinner-container" *ngIf="!productDetails && !error">
  <p-progressSpinner></p-progressSpinner>
</div>
<div *ngIf="error" class="error-container">
  <p-messages [(value)]="messages" [enableService]="false"></p-messages>
</div>
